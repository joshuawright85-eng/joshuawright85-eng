name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: joshuawright85-eng
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=00ff41&color_dots=#0d1117,#00ff4133,#00ff4166,#00ff4199,#00ff41
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
